<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="display:block">
            <rect width="800" height="400" fill="url(#bgd)"/>
            <defs>
              <linearGradient id="bgd" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#EEF3FF"/>
                <stop offset="1" stop-color="#D4E1F7"/>
              </linearGradient>
            </defs>
            <!-- floating card 1 -->
            <g transform="translate(60 70)">
              <rect width="320" height="200" rx="14" fill="#fff" stroke="#E2E8F4"/>
              <text x="20" y="34" font-family="Geist" font-size="13" fill="#6E7582">Weekly review</text>
              <text x="20" y="66" font-family="Instrument Serif" font-size="34" fill="#0E1116">Sales ↑ 12%</text>
              <g transform="translate(20 100)">
                <rect x="0" y="60" width="16" height="30" rx="2" fill="#2563EB"/>
                <rect x="24" y="40" width="16" height="50" rx="2" fill="#2563EB"/>
                <rect x="48" y="25" width="16" height="65" rx="2" fill="#2563EB"/>
                <rect x="72" y="45" width="16" height="45" rx="2" fill="#2563EB"/>
                <rect x="96" y="15" width="16" height="75" rx="2" fill="#2563EB"/>
                <rect x="120" y="35" width="16" height="55" rx="2" fill="#2563EB"/>
                <rect x="144" y="20" width="16" height="70" rx="2" fill="#2563EB"/>
                <rect x="168" y="50" width="16" height="40" rx="2" fill="#2563EB"/>
                <rect x="192" y="30" width="16" height="60" rx="2" fill="#2563EB"/>
                <rect x="216" y="10" width="16" height="80" rx="2" fill="#2563EB"/>
                <rect x="240" y="40" width="16" height="50" rx="2" fill="#2563EB"/>
                <rect x="264" y="25" width="16" height="65" rx="2" fill="#2563EB"/>
              </g>
            </g>
            <!-- floating card 2 -->
            <g transform="translate(440 130)">
              <rect width="300" height="220" rx="14" fill="#fff" stroke="#E2E8F4"/>
              <circle cx="32" cy="32" r="12" fill="#0E1116"/>
              <text x="54" y="30" font-family="Geist" font-size="13" font-weight="600" fill="#0E1116">TrackIQ Agent</text>
              <text x="54" y="46" font-family="Geist" font-size="11" fill="#6E7582">2:14 PM</text>
              <rect x="22" y="66" width="256" height="36" rx="8" fill="#F2F6FF"/>
              <text x="34" y="82" font-family="Geist" font-size="12" fill="#1E3A8A">Why did sales drop yesterday?</text>
              <text x="34" y="96" font-family="Geist" font-size="11" fill="#6E7582">Asked by Maria · Just now</text>
              <rect x="22" y="116" width="256" height="84" rx="8" fill="#0E1116"/>
              <text x="34" y="138" font-family="Geist" font-size="12" fill="#fff">Prime-day SKUs saw a 22% dip —</text>
              <text x="34" y="156" font-family="Geist" font-size="12" fill="#fff">2 ad campaigns went out of budget</text>
              <text x="34" y="174" font-family="Geist" font-size="12" fill="#fff">at 4:12pm, inventory at 3 FCs is low.</text>
              <text x="34" y="192" font-family="Geist" font-size="11" fill="#9BA3B4">Want me to replenish &amp; re-budget?</text>
            </g>
          </svg>