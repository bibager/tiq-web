<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
            <rect width="400" height="250" fill="url(#wh1)"/>
            <defs>
              <linearGradient id="wh1" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#E6EDE1"/><stop offset="1" stop-color="#B7CCA9"/></linearGradient>
            </defs>
            <!-- warehouse boxes illustration -->
            <g transform="translate(50 70)">
              <!-- shelves -->
              <line x1="0" y1="40" x2="300" y2="40" stroke="#556E48" stroke-width="2"/>
              <line x1="0" y1="110" x2="300" y2="110" stroke="#556E48" stroke-width="2"/>
              <!-- boxes row 1 -->
              <rect x="10" y="10" width="40" height="30" fill="#D4A017" stroke="#8A6A0F"/>
              <rect x="54" y="15" width="40" height="25" fill="#B8854A" stroke="#7A5323"/>
              <rect x="98" y="5" width="40" height="35" fill="#D4A017" stroke="#8A6A0F"/>
              <rect x="142" y="12" width="40" height="28" fill="#E4C07A" stroke="#8A6A0F"/>
              <rect x="186" y="8" width="40" height="32" fill="#B8854A" stroke="#7A5323"/>
              <rect x="230" y="18" width="40" height="22" fill="#D4A017" stroke="#8A6A0F"/>
              <!-- boxes row 2 -->
              <rect x="20" y="80" width="38" height="30" fill="#B8854A" stroke="#7A5323"/>
              <rect x="62" y="75" width="40" height="35" fill="#D4A017" stroke="#8A6A0F"/>
              <rect x="106" y="85" width="36" height="25" fill="#E4C07A" stroke="#8A6A0F"/>
