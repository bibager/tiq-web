              <rect x="190" y="90" width="36" height="20" fill="#D4A017" stroke="#8A6A0F"/>
              <!-- a red-flagged box -->
              <rect x="230" y="75" width="40" height="35" fill="#B8542A" stroke="#7A2E10"/>
              <text x="250" y="96" font-family="Geist Mono" font-size="10" fill="#fff" text-anchor="middle">LOW</text>
            </g>
          </svg>